
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能量图谱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#8a8a8a;--ink4:#b8b8b8;--bg:#fafaf8;--bg2:#f2f1ee;--border:#e0deda;--gold:#9a7a3a;--gold-l:#f5edd6;--fire:#c94a2a;--water:#2a5fac;--wood:#3a7a3a;--metal:#6a6a6a;--earth:#8a6a2a;--purple:#5a4a9a;--pl:#eeedfe;--gl:#e1f5ee;--gn:#0f6e56;--al:#faeeda;--am:#854f0b;--cl:#faece7;--co:#993c1d}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem}
.screen.active{display:flex}
#s-result{justify-content:flex-start;padding:0}
.brand{text-align:center;margin-bottom:2.5rem}
.brand h1{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:600;letter-spacing:.12em}
.gold-line{width:32px;height:1px;background:var(--gold);margin:.75rem auto}
.brand p{font-size:13px;color:var(--ink3);letter-spacing:.06em}
.form-box{width:100%;max-width:440px}
.fl{font-size:11px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:block}
.hint{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:1rem;line-height:1.7}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
.pcol{text-align:center}
.pname{font-size:11px;color:var(--ink3);margin-bottom:6px}
.pinputs{display:flex;flex-direction:column;gap:5px}
.prl{font-size:10px;color:var(--ink4);margin-bottom:2px;text-align:left;padding-left:2px}
.pi{width:100%;text-align:center;font-family:'Noto Serif SC',serif;font-size:20px;padding:10px 4px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--ink);outline:none;transition:border-color .2s,background .2s}
.pi:focus{border-color:var(--gold);background:var(--gold-l)}
.pi.v{border-color:var(--wood)}.pi.i{border-color:var(--co)}
.ex{font-size:11px;color:var(--ink4);text-align:center;margin-bottom:1.5rem}
.ex span{display:inline-block;background:var(--bg2);padding:4px 10px;border-radius:99px;cursor:pointer;margin:2px}
.ex span:hover{background:var(--border)}
.btn{width:100%;padding:15px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:15px;font-family:'Noto Sans SC',sans-serif;letter-spacing:.06em;cursor:pointer;margin-top:1rem}
.btn:hover{opacity:.85}
.err{margin-top:1rem;padding:12px 14px;background:var(--cl);border-radius:8px;font-size:13px;color:var(--co);line-height:1.6;display:none}
#s-loading .glyph{font-family:'Noto Serif SC',serif;font-size:64px;color:var(--gold);animation:breathe 2s ease-in-out infinite;margin-bottom:2rem}
@keyframes breathe{0%,100%{opacity:.2;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
.steps{display:flex;flex-direction:column;gap:10px}
.step{font-size:13px;color:var(--ink4);transition:color .4s;display:flex;align-items:center;justify-content:center;gap:8px}
.step.active{color:var(--ink2)}.step.done{color:var(--gold)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.ri{max-width:600px;width:100%;margin:0 auto;padding:2rem 1.25rem 5rem}
.rh{text-align:center;padding:1.5rem 0 2rem}
.pdisplay{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.pc{text-align:center;background:var(--bg2);border-radius:8px;padding:10px 4px;border:1px solid var(--border)}
.pcl{font-size:10px;color:var(--ink3);margin-bottom:4px}
.pcg{font-family:'Noto Serif SC',serif;font-size:20px;line-height:1.5}
.rg{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;margin-bottom:8px;line-height:1.4}
.rbs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:.5rem}
.rb{display:inline-block;font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--gold);color:var(--gold)}
.xiyoudu-box{margin:10px auto 0;display:inline-block;background:var(--gold-l);border:1px solid var(--gold);border-radius:8px;padding:6px 16px;font-size:12px;color:var(--gold)}
.rl{width:32px;height:1px;background:var(--gold);margin:1rem auto 0}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:.875rem}
.ct{font-size:11px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.ct::after{content:'';flex:1;height:.5px;background:var(--border)}
.er{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid var(--bg2)}
.er:last-child{border-bottom:none}
.en{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;width:22px;text-align:center}
.ew{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.ef{height:6px;border-radius:3px}
.ep{font-size:12px;color:var(--ink3);width:34px;text-align:right}
.ur{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:.5px solid var(--bg2);font-size:13px;gap:12px}
.ur:last-child{border-bottom:none}
.ul{color:var(--ink2);flex-shrink:0}.uv{font-weight:500;text-align:right}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:middle}
.tl{background:var(--gl);color:var(--gn)}.tm{background:var(--al);color:var(--am)}.th{background:var(--cl);color:var(--co)}
.tx{background:var(--pl);color:var(--purple)}.the{background:var(--gl);color:var(--gn)}.tch{background:var(--al);color:var(--am)}
.tq{background:var(--bg2);color:var(--ink3);border:.5px solid var(--border)}
.sr{padding:10px 0;border-bottom:.5px solid var(--bg2)}
.sr:last-child{border-bottom:none;padding-bottom:0}
.st{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sn{font-size:14px;font-weight:500}.stags{display:flex;gap:5px;align-items:center}.sp{font-size:12px;color:var(--ink3)}
.sbw{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:5px}
.sbf{height:100%;background:var(--ink3);border-radius:2px}
.sn2{font-size:11px;color:var(--ink3)}
.gi{padding:12px 0;border-bottom:.5px solid var(--bg2)}
.gi:last-child{border-bottom:none;padding-bottom:0}
.gh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.gz{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:500}
.gd{font-size:12px;color:var(--ink3);margin-bottom:5px}.gx{font-size:13px;color:var(--ink2);line-height:1.7}
.narr{font-size:15px;line-height:2}
.bas{display:flex;gap:8px;margin-top:1.5rem}
.ba{flex:1;padding:13px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink2);cursor:pointer}
.ba:hover{background:var(--bg2)}
.br{padding:13px 16px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--ink3);cursor:pointer}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="screen active" id="s-input">
  <div class="brand"><h1>能量图谱</h1><div class="gold-line"></div><p>冰山下的性格能量解码</p></div>
  <div class="form-box">
    <label class="fl">四柱八字</label>
    <div class="hint">输入你的八字，天干地支各一格</div>
    <div class="pgrid">
      <div class="pcol"><div class="pname">年柱</div><div class="pinputs"><div class="prl">天干</div><input class="pi" id="n-tg" maxlength="1" placeholder="甲"><div class="prl">地支</div><input class="pi" id="n-dz" maxlength="1" placeholder="寅"></div></div>
      <div class="pcol"><div class="pname">月柱</div><div class="pinputs"><div class="prl">天干</div><input class="pi" id="y-tg" maxlength="1" placeholder="己"><div class="prl">地支</div><input class="pi" id="y-dz" maxlength="1" placeholder="巳"></div></div>
      <div class="pcol"><div class="pname">日柱</div><div class="pinputs"><div class="prl">天干</div><input class="pi" id="r-tg" maxlength="1" placeholder="丙"><div class="prl">地支</div><input class="pi" id="r-dz" maxlength="1" placeholder="子"></div></div>
      <div class="pcol"><div class="pname">时柱</div><div class="pinputs"><div class="prl">天干</div><input class="pi" id="s-tg" maxlength="1" placeholder="壬"><div class="prl">地支</div><input class="pi" id="s-dz" maxlength="1" placeholder="辰"></div></div>
    </div>
    <div class="ex">示例：<span onclick="fill()">甲寅 己巳 丙子 壬辰</span></div>
    <button class="btn" onclick="go()">解读我的能量图谱</button>
    <div class="err" id="err"></div>
  </div>
</div>

<div class="screen" id="s-loading">
  <div class="glyph" id="gl">命</div>
  <div class="steps">
    <div class="step" id="ls1"><div class="dot"></div>排盘 · 定日主</div>
    <div class="step" id="ls2"><div class="dot"></div>计算先天能量底色</div>
    <div class="step" id="ls3"><div class="dot"></div>推演做工关系与动能转化</div>
    <div class="step" id="ls4"><div class="dot"></div>生成能量解读</div>
  </div>
</div>

<div class="screen" id="s-result"><div class="ri" id="ri"></div></div>
<div class="toast" id="toast"></div>

<script>
const TG=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const WC={火:'#c94a2a',水:'#2a5fac',木:'#3a7a3a',金:'#6a6a6a',土:'#8a6a2a'};
let saved=null,lt=null;

function fill(){
  const vals=['甲','寅','己','巳','丙','子','壬','辰'];
  ['n-tg','n-dz','y-tg','y-dz','r-tg','r-dz','s-tg','s-dz'].forEach((id,i)=>{
    document.getElementById(id).value=vals[i];
  });
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function validate(){
  const fs=[{id:'n-tg',l:TG},{id:'n-dz',l:DZ},{id:'y-tg',l:TG},{id:'y-dz',l:DZ},{id:'r-tg',l:TG},{id:'r-dz',l:DZ},{id:'s-tg',l:TG},{id:'s-dz',l:DZ}];
  for(const f of fs){const v=document.getElementById(f.id).value.trim();if(!v||!f.l.includes(v))return false;}
  return true;
}

function getVals(){
  return['n-tg','n-dz','y-tg','y-dz','r-tg','r-dz','s-tg','s-dz'].map(id=>document.getElementById(id).value.trim());
}

function startAnim(){
  const gs=['命','格','局','象','道','气','运','化','玄','机'];
  const ss=['ls1','ls2','ls3','ls4'];
  let gi=0,si=0;
  document.getElementById('gl').textContent=gs[0];
  ss.forEach(s=>{const e=document.getElementById(s);e.classList.remove('active','done');});
  document.getElementById(ss[0]).classList.add('active');
  lt=setInterval(()=>{
    gi=(gi+1)%gs.length;
    document.getElementById('gl').textContent=gs[gi];
    if(gi%3===0&&si<ss.length-1){
      document.getElementById(ss[si]).classList.remove('active');
      document.getElementById(ss[si]).classList.add('done');
      si++;document.getElementById(ss[si]).classList.add('active');
    }
  },700);
}

function stopAnim(){
  if(lt)clearInterval(lt);
  ['ls1','ls2','ls3','ls4'].forEach(s=>{
    document.getElementById(s).classList.remove('active');
    document.getElementById(s).classList.add('done');
  });
}

async function go(){
  const err=document.getElementById('err');
  err.style.display='none';
  if(!validate()){err.textContent='请检查八字——天干：甲乙丙丁戊己庚辛壬癸；地支：子丑寅卯辰巳午未申酉戌亥';err.style.display='block';return;}
  const [ntg,ndz,ytg,ydz,rtg,rdz,stg,sdz]=getVals();
  const bazi=`年柱${ntg}${ndz} 月柱${ytg}${ydz} 日柱${rtg}${rdz} 时柱${stg}${sdz}`;
  show('s-loading');startAnim();
  try{
    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bazi})});
    const data=await resp.json();
    if(data.error&&!data.result)throw new Error(data.error);
    const r=JSON.parse(data.result);
    r.shishen_list=Array.isArray(r.shishen_list)?r.shishen_list:[];
    r.kongbai=Array.isArray(r.kongbai)?r.kongbai:[];
    r.wuxing=r.wuxing&&typeof r.wuxing==='object'?r.wuxing:{};
    r.gongzuo=r.gongzuo&&typeof r.gongzuo==='object'?r.gongzuo:{};
    r.gongzuo.he=Array.isArray(r.gongzuo.he)?r.gongzuo.he:[];
    r.gongzuo.chong_tg=Array.isArray(r.gongzuo.chong_tg)?r.gongzuo.chong_tg:[];
    r.neihao=r.neihao&&typeof r.neihao==='object'?r.neihao:{zhi:0,dengji:'',yuanyin:''};
    r.nengliang_liyong=r.nengliang_liyong||0;
    r.jieda=r.jieda||'';
    r.gejuming=r.gejuming||'';
    r.qudongmoshi=r.qudongmoshi||'';
    r.gejuli=r.gejuli||'';
    r.rizhu=r.rizhu||'';
    r.xiyoudu=r.xiyoudu||'';
    saved={r,i:{ntg,ndz,ytg,ydz,rtg,rdz,stg,sdz}};
    stopAnim();render(r,saved.i);show('s-result');window.scrollTo(0,0);
  }catch(e){
    stopAnim();show('s-input');
    err.textContent='解析出错：'+e.message;err.style.display='block';
  }
}

function tagClass(z,j){
  if(j&&j.includes('合激活'))return 'the';
  if(j&&j.includes('冲激活'))return 'tch';
  if(j&&j.includes('天干透出'))return 'the';
  if(z==='已显化')return 'tx';
  return 'tq';
}

function tagText(z,j){
  if(j&&j.includes('合激活'))return '合激活·持续稳定';
  if(j&&j.includes('冲激活'))return '冲激活·脉冲爆发';
  if(j&&j.includes('天干透出'))return '天干透出·已显化';
  if(z==='已显化')return '已显化·前30%';
  return '潜力待激活';
}

function render(r,i){
  const ly=Math.round((r.nengliang_liyong||0)*100);
  const nh=Math.round(((r.neihao&&r.neihao.zhi)||0)*100);
  const dengji=(r.neihao&&r.neihao.dengji)||'';
  const yuanyin=(r.neihao&&r.neihao.yuanyin)||'';
  const tc=dengji==='低内耗'?'tl':dengji.includes('中')?'tm':'th';
  const wx=Object.entries(r.wuxing).sort((a,b)=>b[1]-a[1]);
  const mw=wx.length>0?wx[0][1]:1;
  const ss=r.shishen_list.filter(s=>s&&s.defen>0).sort((a,b)=>b.defen-a.defen);
  const ssTG=r.shishen_list.filter(s=>s&&s.defen===0&&s.zhuangtai==='已显化');
  const ms=ss.length>0?ss[0].defen:1;
  const he=(r.gongzuo.he||[]).filter(h=>h&&h.zuhe);
  const ct=(r.gongzuo.chong_tg||[]).filter(c=>c&&c.zuhe);
  const kb=r.kongbai||[];

  // 格局名按·分割显示
  const gejumingParts=r.gejuming.split('·');
  const gejumingHTML=gejumingParts.length>1
    ? `<span style="font-size:18px;color:var(--ink3)">${gejumingParts[0]}</span><br><span style="font-size:20px">${gejumingParts.slice(1).join(' · ')}</span>`
    : r.gejuming;

  document.getElementById('ri').innerHTML=`
    <div class="rh">
      <div class="pdisplay">
        ${[['年柱',i.ntg,i.ndz],['月柱',i.ytg,i.ydz],['日柱',i.rtg,i.rdz],['时柱',i.stg,i.sdz]]
          .map(([l,t,d])=>`<div class="pc"><div class="pcl">${l}</div><div class="pcg">${t}<br>${d}</div></div>`).join('')}
      </div>
      <div class="rg">${gejumingHTML}</div>
      <div class="rbs">
        <span class="rb">${r.qudongmoshi}</span>
        <span class="rb">${r.gejuli}</span>
        <span class="rb">日主 ${r.rizhu}</span>
      </div>
      ${r.xiyoudu?`<div style="text-align:center"><div class="xiyoudu-box">✦ ${r.xiyoudu}</div></div>`:''}
      <div class="rl"></div>
    </div>

    <div class="card">
      <div class="ct">先天能量底色</div>
      ${wx.map(([n,v])=>`
        <div class="er">
          <div class="en" style="color:${WC[n]||'#888'}">${n}</div>
          <div class="ew"><div class="ef" style="width:${mw>0?Math.round(v/mw*100):0}%;background:${WC[n]||'#888'}"></div></div>
          <div class="ep">${Math.round(v*100)}%</div>
        </div>`).join('')}
      ${kb.length?`<div style="margin-top:10px;font-size:12px;color:var(--ink4)">空白缺失：${kb.filter(k=>typeof k==='string').join('、')}</div>`:''}
    </div>

    <div class="card">
      <div class="ct">能量利用率 · 内耗</div>
      <div class="ur"><span class="ul">能量利用率</span><span class="uv">${ly}%</span></div>
      <div class="ur"><span class="ul">内耗值</span><span class="uv">${nh}% <span class="tag ${tc}">${dengji}</span></span></div>
      <div class="ur"><span class="ul">内耗来源</span><span class="uv" style="font-weight:400;color:var(--ink2);font-size:12px">${yuanyin}</span></div>
    </div>

    ${ss.length>0?`
    <div class="card">
      <div class="ct">十神驱动力 · 实际能力</div>
      ${ss.map(s=>`
        <div class="sr">
          <div class="st">
            <span class="sn">${s.shishen||''}</span>
            <div class="stags">
              <span class="tag ${tagClass(s.zhuangtai,s.jihuo_type)}">${tagText(s.zhuangtai,s.jihuo_type)}</span>
              <span class="sp">${Math.round((s.defen||0)*100)}%</span>
            </div>
          </div>
          <div class="sbw"><div class="sbf" style="width:${ms>0?Math.round((s.defen||0)/ms*100):0}%"></div></div>
          <div class="sn2">实际能力：${s.shiji_nengli||''} · ${s.renqun||''}</div>
        </div>`).join('')}
      ${ssTG.length>0?`
        <div style="margin-top:10px;padding-top:10px;border-top:.5px solid var(--bg2)">
          <div style="font-size:11px;color:var(--ink3);margin-bottom:6px">天干透出 · 做工激活</div>
          ${ssTG.map(s=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px">
              <span>${s.shishen||''}</span>
              <span class="tag the">已显化 · ${s.renqun||'前30%'}</span>
            </div>`).join('')}
        </div>`:''}
    </div>`:''}

    ${(he.length||ct.length)?`
    <div class="card">
      <div class="ct">做工关系 · 动能转化</div>
      ${he.map(h=>`
        <div class="gi">
          <div class="gh"><span class="gz">${h.zuhe||''}</span><span class="tag the">合·持续稳定</span></div>
          <div class="gd">${h.gaoneng_ss||''} 带动 ${h.dineng_ss||''}</div>
          <div class="gx">${h.fuzhetezhi||''}</div>
        </div>`).join('')}
      ${ct.map(c=>`
        <div class="gi">
          <div class="gh"><span class="gz">${c.zuhe||''}</span><span class="tag tch">冲·脉冲爆发</span></div>
          <div class="gd">${c.zhudong_ss||''} 主动冲击 ${c.beidong_ss||''}</div>
          <div class="gx">${c.biaoxian||''}</div>
        </div>`).join('')}
    </div>`:''}

    <div class="card">
      <div class="ct">能量解读</div>
      <div class="narr">${r.jieda}</div>
    </div>

    <div class="bas">
      <button class="ba" onclick="cp()">复制解读</button>
      <button class="ba" onclick="sh()">分享图谱</button>
      <button class="br" onclick="restart()">重测</button>
    </div>`;
}

function cp(){
  if(!saved)return;
  const r=saved.r,i=saved.i;
  navigator.clipboard.writeText(
    `【能量图谱】${i.ntg}${i.ndz} ${i.ytg}${i.ydz} ${i.rtg}${i.rdz} ${i.stg}${i.sdz}\n\n${r.gejuming}\n${r.xiyoudu?r.xiyoudu+'\n':''}\n${r.jieda}`
  ).then(()=>showToast('已复制'));
}

function sh(){
  if(!saved)return;
  const r=saved.r;
  const t=`我的能量图谱：${r.gejuming}\n${r.xiyoudu||''}\n\n${(r.jieda||'').slice(0,100)}...`;
  if(navigator.share)navigator.share({title:'能量图谱',text:t});
  else navigator.clipboard.writeText(t).then(()=>showToast('已复制分享内容'));
}

function restart(){
  saved=null;document.getElementById('err').style.display='none';
  show('s-input');window.scrollTo(0,0);
}

['n-tg','y-tg','r-tg','s-tg'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    this.classList.toggle('v',TG.includes(this.value));
    this.classList.toggle('i',!!this.value&&!TG.includes(this.value));
  });
});
['n-dz','y-dz','r-dz','s-dz'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    this.classList.toggle('v',DZ.includes(this.value));
    this.classList.toggle('i',!!this.value&&!DZ.includes(this.value));
  });
});
</script>
</body>
