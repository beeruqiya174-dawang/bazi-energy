<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能量图谱 · 冰山下的性格解码</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a1a; --ink2: #4a4a4a; --ink3: #8a8a8a; --ink4: #b8b8b8;
    --bg: #fafaf8; --bg2: #f2f1ee; --bg3: #e8e7e3; --border: #e0deda;
    --gold: #9a7a3a; --gold-light: #f5edd6;
    --fire: #c94a2a; --water: #2a5fac; --wood: #3a7a3a; --metal: #6a6a6a; --earth: #8a6a2a;
    --purple: #5a4a9a; --purple-light: #eeedfe;
    --green-light: #e1f5ee; --green: #0f6e56;
    --amber-light: #faeeda; --amber: #854f0b;
    --coral-light: #faece7; --coral: #993c1d;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* INPUT */
  #s-input { align-items: center; justify-content: center; padding: 2rem 1.5rem; }
  .brand { text-align: center; margin-bottom: 3rem; }
  .brand-title { font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 600; letter-spacing: 0.12em; margin-bottom: 0.5rem; }
  .brand-line { width: 32px; height: 1px; background: var(--gold); margin: 0.75rem auto; }
  .brand-sub { font-size: 13px; color: var(--ink3); letter-spacing: 0.06em; }
  .form-box { width: 100%; max-width: 440px; }
  .field-label { font-size: 11px; color: var(--ink3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .pillar-hint { font-size: 12px; color: var(--ink3); text-align: center; margin-bottom: 1rem; line-height: 1.7; }
  .pillars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
  .pillar-col { text-align: center; }
  .pillar-name { font-size: 11px; color: var(--ink3); margin-bottom: 6px; }
  .gz-inputs { display: flex; flex-direction: column; gap: 5px; }
  .gz-row-label { font-size: 10px; color: var(--ink4); margin-bottom: 2px; text-align: left; padding-left: 2px; }
  .gz-input { width: 100%; text-align: center; font-family: 'Noto Serif SC', serif; font-size: 20px; padding: 10px 4px; border: 1px solid var(--border); border-radius: 8px; background: white; color: var(--ink); outline: none; transition: border-color 0.2s, background 0.2s; }
  .gz-input:focus { border-color: var(--gold); background: var(--gold-light); }
  .gz-input.valid { border-color: #3a7a3a; }
  .gz-input.invalid { border-color: var(--coral); }
  .example-hint { font-size: 11px; color: var(--ink4); text-align: center; margin-bottom: 1.5rem; }
  .example-hint span { display: inline-block; background: var(--bg2); padding: 4px 10px; border-radius: 99px; cursor: pointer; transition: background 0.2s; margin: 2px; }
  .example-hint span:hover { background: var(--bg3); }
  .btn-analyze { width: 100%; padding: 15px; background: var(--ink); color: white; border: none; border-radius: 10px; font-size: 15px; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 0.06em; cursor: pointer; transition: opacity 0.2s; margin-top: 1rem; }
  .btn-analyze:hover { opacity: 0.85; }
  .btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }
  .err-msg { margin-top: 1rem; padding: 12px 14px; background: var(--coral-light); border-radius: 8px; font-size: 13px; color: var(--coral); line-height: 1.6; display: none; }

  /* LOADING */
  #s-loading { align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .loading-glyph { font-family: 'Noto Serif SC', serif; font-size: 64px; color: var(--gold); animation: breathe 2s ease-in-out infinite; margin-bottom: 2rem; }
  @keyframes breathe { 0%,100%{opacity:0.2;transform:scale(0.95)} 50%{opacity:1;transform:scale(1.05)} }
  .loading-steps { display: flex; flex-direction: column; gap: 10px; }
  .loading-step { font-size: 13px; color: var(--ink4); transition: color 0.4s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .loading-step.active { color: var(--ink2); }
  .loading-step.done { color: var(--gold); }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* RESULT */
  #s-result { padding: 0; }
  .result-inner { max-width: 600px; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
  .result-header { text-align: center; padding: 1.5rem 0 2rem; }
  .pillars-display { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1.5rem; }
  .pd-cell { text-align: center; background: var(--bg2); border-radius: 8px; padding: 10px 4px; border: 1px solid var(--border); }
  .pd-label { font-size: 10px; color: var(--ink3); margin-bottom: 4px; }
  .pd-gz { font-family: 'Noto Serif SC', serif; font-size: 20px; color: var(--ink); line-height: 1.5; }
  .result-gejuming { font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .result-badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .rbadge { display: inline-block; font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 1px solid var(--gold); color: var(--gold); letter-spacing: 0.04em; }
  .result-line { width: 32px; height: 1px; background: var(--gold); margin: 1rem auto 0; }
  .rcard { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 0.875rem; }
  .rcard-title { font-size: 11px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.1rem; display: flex; align-items: center; gap: 8px; }
  .rcard-title::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
  .ebar-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--bg2); }
  .ebar-row:last-child { border-bottom: none; }
  .ebar-name { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; width: 22px; text-align: center; }
  .ebar-wrap { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
  .ebar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }
  .ebar-pct { font-size: 12px; color: var(--ink3); width: 34px; text-align: right; }
  .util-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 0.5px solid var(--bg2); font-size: 13px; gap: 12px; }
  .util-row:last-child { border-bottom: none; }
  .util-label { color: var(--ink2); flex-shrink: 0; }
  .util-val { font-weight: 500; text-align: right; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; vertical-align: middle; }
  .tag-low { background: var(--green-light); color: var(--green); }
  .tag-mid { background: var(--amber-light); color: var(--amber); }
  .tag-high { background: var(--coral-light); color: var(--coral); }
  .tag-xianhua { background: var(--purple-light); color: var(--purple); }
  .tag-he { background: var(--green-light); color: var(--green); }
  .tag-chong { background: var(--amber-light); color: var(--amber); }
  .tag-qianli { background: var(--bg2); color: var(--ink3); border: 0.5px solid var(--border); }
  .ss-row { padding: 10px 0; border-bottom: 0.5px solid var(--bg2); }
  .ss-row:last-child { border-bottom: none; padding-bottom: 0; }
  .ss-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .ss-name { font-size: 14px; font-weight: 500; }
  .ss-tags { display: flex; gap: 5px; align-items: center; }
  .ss-pct { font-size: 12px; color: var(--ink3); }
  .ss-bar-wrap { height: 4px; background: var(--bg2); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .ss-bar-fill { height: 100%; background: var(--ink3); border-radius: 2px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }
  .ss-note { font-size: 11px; color: var(--ink3); }
  .gz-item-r { padding: 12px 0; border-bottom: 0.5px solid var(--bg2); }
  .gz-item-r:last-child { border-bottom: none; padding-bottom: 0; }
  .gz-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .gz-zuhe { font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 500; }
  .gz-direction { font-size: 12px; color: var(--ink3); margin-bottom: 5px; }
  .gz-desc { font-size: 13px; color: var(--ink2); line-height: 1.7; }
  .narrative { font-size: 15px; line-height: 2; }
  .bottom-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
  .btn-action { flex: 1; padding: 13px; border: 1px solid var(--border); border-radius: 10px; background: white; font-size: 13px; font-family: 'Noto Sans SC', sans-serif; color: var(--ink2); cursor: pointer; transition: background 0.2s; }
  .btn-action:hover { background: var(--bg2); }
  .btn-restart { padding: 13px 16px; border: 1px solid var(--border); border-radius: 10px; background: white; font-size: 13px; font-family: 'Noto Sans SC', sans-serif; color: var(--ink3); cursor: pointer; }
  .btn-restart:hover { background: var(--bg2); }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: white; padding: 10px 20px; border-radius: 99px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="screen active" id="s-input">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;">
    <div class="form-box">
      <div class="brand">
        <div class="brand-title">能量图谱</div>
        <div class="brand-line"></div>
        <div class="brand-sub">冰山下的性格能量解码</div>
      </div>
      <div style="margin-bottom:2rem">
        <label class="field-label">四柱八字</label>
        <div class="pillar-hint">输入你的八字，天干地支各一格</div>
        <div class="pillars-grid">
          <div class="pillar-col">
            <div class="pillar-name">年柱</div>
            <div class="gz-inputs">
              <div class="gz-row-label">天干</div>
              <input class="gz-input" id="n-tg" maxlength="1" placeholder="甲">
              <div class="gz-row-label">地支</div>
              <input class="gz-input" id="n-dz" maxlength="1" placeholder="寅">
            </div>
          </div>
          <div class="pillar-col">
            <div class="pillar-name">月柱</div>
            <div class="gz-inputs">
              <div class="gz-row-label">天干</div>
              <input class="gz-input" id="y-tg" maxlength="1" placeholder="己">
              <div class="gz-row-label">地支</div>
              <input class="gz-input" id="y-dz" maxlength="1" placeholder="巳">
            </div>
          </div>
          <div class="pillar-col">
            <div class="pillar-name">日柱</div>
            <div class="gz-inputs">
              <div class="gz-row-label">天干</div>
              <input class="gz-input" id="r-tg" maxlength="1" placeholder="丙">
              <div class="gz-row-label">地支</div>
              <input class="gz-input" id="r-dz" maxlength="1" placeholder="子">
            </div>
          </div>
          <div class="pillar-col">
            <div class="pillar-name">时柱</div>
            <div class="gz-inputs">
              <div class="gz-row-label">天干</div>
              <input class="gz-input" id="s-tg" maxlength="1" placeholder="壬">
              <div class="gz-row-label">地支</div>
              <input class="gz-input" id="s-dz" maxlength="1" placeholder="辰">
            </div>
          </div>
        </div>
        <div class="example-hint">
          示例：<span onclick="fillExample('甲','寅','己','巳','丙','子','壬','辰')">甲寅 己巳 丙子 壬辰</span>
        </div>
      </div>
      <button class="btn-analyze" id="btn-go" onclick="startAnalysis()">解读我的能量图谱</button>
      <div class="err-msg" id="err-msg"></div>
    </div>
  </div>
</div>

<div class="screen" id="s-loading">
  <div class="loading-glyph" id="l-glyph">命</div>
  <div class="loading-steps">
    <div class="loading-step" id="ls-1"><div class="step-dot"></div>排盘 · 定日主</div>
    <div class="loading-step" id="ls-2"><div class="step-dot"></div>计算先天能量底色</div>
    <div class="loading-step" id="ls-3"><div class="step-dot"></div>推演做工关系与动能转化</div>
    <div class="loading-step" id="ls-4"><div class="step-dot"></div>生成能量解读</div>
  </div>
</div>

<div class="screen" id="s-result">
  <div class="result-inner" id="result-inner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TG = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DZ = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const WX_COLOR = { 火:'#c94a2a', 水:'#2a5fac', 木:'#3a7a3a', 金:'#6a6a6a', 土:'#8a6a2a' };
let savedResult = null;

function fillExample(ntg,ndz,ytg,ydz,rtg,rdz,stg,sdz) {
  document.getElementById('n-tg').value=ntg; document.getElementById('n-dz').value=ndz;
  document.getElementById('y-tg').value=ytg; document.getElementById('y-dz').value=ydz;
  document.getElementById('r-tg').value=rtg; document.getElementById('r-dz').value=rdz;
  document.getElementById('s-tg').value=stg; document.getElementById('s-dz').value=sdz;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function validate() {
  const fields=[
    {id:'n-tg',list:TG},{id:'n-dz',list:DZ},{id:'y-tg',list:TG},{id:'y-dz',list:DZ},
    {id:'r-tg',list:TG},{id:'r-dz',list:DZ},{id:'s-tg',list:TG},{id:'s-dz',list:DZ}
  ];
  for(const f of fields){ const v=document.getElementById(f.id).value.trim(); if(!v||!f.list.includes(v)) return false; }
  return true;
}

function getInputs() {
  return {
    nTG:document.getElementById('n-tg').value.trim(), nDZ:document.getElementById('n-dz').value.trim(),
    yTG:document.getElementById('y-tg').value.trim(), yDZ:document.getElementById('y-dz').value.trim(),
    rTG:document.getElementById('r-tg').value.trim(), rDZ:document.getElementById('r-dz').value.trim(),
    sTG:document.getElementById('s-tg').value.trim(), sDZ:document.getElementById('s-dz').value.trim()
  };
}

let loadTimer=null;
function startLoadingAnim() {
  const glyphs=['命','格','局','象','道','气','运','化','玄','机'];
  const steps=['ls-1','ls-2','ls-3','ls-4'];
  let gi=0,si=0;
  document.getElementById('l-glyph').textContent=glyphs[0];
  steps.forEach(s=>{ const el=document.getElementById(s); el.classList.remove('active','done'); });
  document.getElementById(steps[0]).classList.add('active');
  loadTimer=setInterval(()=>{
    gi=(gi+1)%glyphs.length;
    document.getElementById('l-glyph').textContent=glyphs[gi];
    if(gi%3===0&&si<steps.length-1){
      document.getElementById(steps[si]).classList.remove('active');
      document.getElementById(steps[si]).classList.add('done');
      si++; document.getElementById(steps[si]).classList.add('active');
    }
  },700);
}

function stopLoadingAnim() {
  if(loadTimer) clearInterval(loadTimer);
  ['ls-1','ls-2','ls-3','ls-4'].forEach(s=>{ document.getElementById(s).classList.remove('active'); document.getElementById(s).classList.add('done'); });
}

async function startAnalysis() {
  const errEl=document.getElementById('err-msg');
  errEl.style.display='none';
  if(!validate()){ errEl.textContent='请检查八字输入——天干：甲乙丙丁戊己庚辛壬癸；地支：子丑寅卯辰巳午未申酉戌亥'; errEl.style.display='block'; return; }
  const inputs=getInputs();
  showScreen('s-loading');
  startLoadingAnim();
  try {
    const result=await callAPI(inputs);
    savedResult={result,inputs};
    stopLoadingAnim();
    renderResult(result,inputs);
    showScreen('s-result');
    window.scrollTo(0,0);
  } catch(e) {
    stopLoadingAnim();
    showScreen('s-input');
    errEl.textContent='解析出错：'+e.message; errEl.style.display='block';
  }
}

const SYSTEM_PROMPT=`你是八字能量分析系统。严格按规则计算，输出JSON，不加任何其他文字，不加markdown代码块。

【基础对照】
天干五行阴阳：甲=阳木 乙=阴木 丙=阳火 丁=阴火 戊=阳土 己=阴土 庚=阳金 辛=阴金 壬=阳水 癸=阴水
地支主气：子=癸水 丑=己土 寅=甲木 卯=乙木 辰=戊土 巳=丙火 午=丁火 未=己土 申=庚金 酉=辛金 戌=戊土 亥=壬水
地支阴阳：子阳 丑阴 寅阳 卯阴 辰阳 巳阴 午阳 未阴 申阳 酉阴 戌阳 亥阴
五行生克：木生火 火生土 土生金 金生水 水生木 / 木克土 土克水 水克火 火克金 金克木

【能量计算】
地支权重：月令45% 时支30% 日支15% 年支10%
衰减系数（月令五行为基准）：同气=1.0 月令所生=0.9 生月令=0.5 克月令=0.2 月令所克=0.1
天干系数：全盘任意地支含同五行=1.0 / 同柱地支生该天干五行=0.6 / 以上都不满足=0.3
日主天干也算透干
地支得分=权重×衰减系数×天干系数
能量利用率=四地支得分之和（不归一化）
内耗=1.0-能量利用率

【地支三种状态】
已显化：地支有对应天干透出（含日主）且天干有根→人群前30%稳定能力资产（土约前50%）
潜力：地支有对应五行但无天干透出→待激活
空白：某五行既无天干也无地支→能量缺失

【十神（日主为基准）】
生我同阴阳=偏印 生我异阴阳=正印 我生同阴阳=食神 我生异阴阳=伤官
克我同阴阳=七杀 克我异阴阳=正官 我克同阴阳=偏财 我克异阴阳=正财 同我同阴阳=比肩 同我异阴阳=劫财

【格局】月令地支主气对日主十神关系即格局
驱动模式：食神/伤官=输出型 正财/偏财/正官/七杀=掌控型 正印/偏印/比肩/劫财=内核型

【做工关系与动能转化】
天干五合：甲己 乙庚 丙辛 丁壬 戊癸→弹性碰撞，高能量持续带动低能量，合激活·持续稳定
天干六冲：甲庚 乙辛 丙壬 丁癸→脉冲激活，强方主动冲击弱方，冲激活·脉冲爆发
地支六冲：子午 丑未 寅申 卯酉 辰戌 巳亥→地支做工受压

合激活：被带动方实际能力远超原始得分，持续稳定，复合特质=[十神A]×[十神B]逻辑推导
冲激活：被激活方应激爆发，遇强则强

【内耗等级】0-10%=低内耗 10-25%=中内耗 25-40%=高内耗 40%+=极高内耗

【叙事原则】
1.已显化十神：人群前30%稳定能力资产
2.合激活十神：实际能力强，持续稳定，超出原始得分
3.冲激活十神：应激爆发，遇强则强
4.空白五行：该维度真正缺失
5.能量解读：300字，第二人称「你」，有洞察力，让人感觉「说的就是我」，讲清楚能量如何运转、做工激活带来的实际能力、内耗来源。不罗列，要有叙事张力。

输出纯JSON（无任何额外文字）：
{"rizhu":"","gejuming":"","qudongmoshi":"","gejuli":"","dizhi_mingxi":[{"zhu":"月令","dizhi":"","wuxing":"","quanzhong":0.45,"shuaijian":0.0,"tianganxi":0.0,"defen":0.0,"shishen":"","zhuangtai":"","renqun":""}],"wuxing":{"火":0.0,"土":0.0,"木":0.0,"水":0.0,"金":0.0},"shishen_list":[{"shishen":"","defen":0.0,"zhuangtai":"已显化","jihuo_type":"","renqun":"前30%","shiji_nengli":"强"}],"nengliang_liyong":0.0,"neihao":{"zhi":0.0,"dengji":"","yuanyin":""},"kongbai":[],"gongzuo":{"he":[{"zuhe":"","gaoneng_ss":"","dineng_ss":"","fuzhetezhi":""}],"chong_tg":[{"zuhe":"","zhudong_ss":"","beidong_ss":"","biaoxian":""}],"chong_dz":[{"zuhe":"","yingxiang":""}]},"jieda":""}`;

async function callAPI(inputs) {
  const userMsg=`四柱八字：年柱${inputs.nTG}${inputs.nDZ} 月柱${inputs.yTG}${inputs.yDZ} 日柱${inputs.rTG}${inputs.rDZ} 时柱${inputs.sTG}${inputs.sDZ}`;
  const resp=await fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:userMsg}]})
  });
  if(!resp.ok){ const err=await resp.json().catch(()=>({})); throw new Error(err.error?.message||`HTTP ${resp.status}`); }
  const data=await resp.json();
  const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function getBadgeClass(zhuangtai,jihuo_type) {
  if(jihuo_type==='合激活') return 'tag-he';
  if(jihuo_type==='冲激活') return 'tag-chong';
  if(zhuangtai==='已显化') return 'tag-xianhua';
  return 'tag-qianli';
}

function getBadgeText(zhuangtai,jihuo_type) {
  if(jihuo_type==='合激活') return '合激活·持续稳定';
  if(jihuo_type==='冲激活') return '冲激活·脉冲爆发';
  if(zhuangtai==='已显化') return '已显化·前30%';
  return '潜力待激活';
}

function renderResult(r,inputs) {
  const liyong=Math.round(r.nengliang_liyong*100);
  const neihao=Math.round(r.neihao.zhi*100);
  const tagCls=r.neihao.dengji==='低内耗'?'tag-low':r.neihao.dengji==='中内耗'?'tag-mid':'tag-high';
  const wxEntries=Object.entries(r.wuxing).sort((a,b)=>b[1]-a[1]);
  const maxWx=wxEntries[0]?.[1]||0.001;
  const ssList=(r.shishen_list||[]).filter(s=>s.defen>0).sort((a,b)=>b.defen-a.defen);
  const maxSS=ssList[0]?.defen||0.001;
  const he=(r.gongzuo?.he||[]).filter(h=>h.zuhe);
  const chongTG=(r.gongzuo?.chong_tg||[]).filter(c=>c.zuhe);
  const chongDZ=(r.gongzuo?.chong_dz||[]).filter(c=>c.zuhe);
  const kongbai=r.kongbai||[];

  document.getElementById('result-inner').innerHTML=`
    <div class="result-header">
      <div class="pillars-display">
        ${[['年柱',inputs.nTG,inputs.nDZ],['月柱',inputs.yTG,inputs.yDZ],['日柱',inputs.rTG,inputs.rDZ],['时柱',inputs.sTG,inputs.sDZ]]
          .map(([l,tg,dz])=>`<div class="pd-cell"><div class="pd-label">${l}</div><div class="pd-gz">${tg}<br>${dz}</div></div>`).join('')}
      </div>
      <div class="result-gejuming">${r.gejuming}</div>
      <div class="result-badges">
        <span class="rbadge">${r.qudongmoshi}</span>
        <span class="rbadge">${r.gejuli}</span>
        <span class="rbadge">日主 ${r.rizhu}</span>
      </div>
      <div class="result-line"></div>
    </div>

    <div class="rcard">
      <div class="rcard-title">先天能量底色</div>
      ${wxEntries.map(([name,val])=>`
        <div class="ebar-row">
          <div class="ebar-name" style="color:${WX_COLOR[name]}">${name}</div>
          <div class="ebar-wrap"><div class="ebar-fill" style="width:${Math.round(val/maxWx*100)}%;background:${WX_COLOR[name]}"></div></div>
          <div class="ebar-pct">${Math.round(val*100)}%</div>
        </div>`).join('')}
      ${kongbai.length>0?`<div style="margin-top:10px;font-size:12px;color:var(--ink4)">空白缺失：${kongbai.join('、')}</div>`:''}
    </div>

    <div class="rcard">
      <div class="rcard-title">能量利用率 · 内耗</div>
      <div class="util-row"><span class="util-label">能量利用率</span><span class="util-val">${liyong}%</span></div>
      <div class="util-row"><span class="util-label">内耗值</span><span class="util-val">${neihao}% <span class="tag ${tagCls}">${r.neihao.dengji}</span></span></div>
      <div class="util-row"><span class="util-label">内耗来源</span><span class="util-val" style="font-weight:400;color:var(--ink2)">${r.neihao.yuanyin}</span></div>
    </div>

    <div class="rcard">
      <div class="rcard-title">十神驱动力 · 实际能力</div>
      ${ssList.map(s=>`
        <div class="ss-row">
          <div class="ss-top">
            <span class="ss-name">${s.shishen}</span>
            <div class="ss-tags">
              <span class="tag ${getBadgeClass(s.zhuangtai,s.jihuo_type)}">${getBadgeText(s.zhuangtai,s.jihuo_type)}</span>
              <span class="ss-pct">${Math.round(s.defen*100)}%</span>
            </div>
          </div>
          <div class="ss-bar-wrap"><div class="ss-bar-fill" style="width:${Math.round(s.defen/maxSS*100)}%"></div></div>
          <div class="ss-note">实际能力：${s.shiji_nengli} · ${s.renqun}</div>
        </div>`).join('')}
    </div>

    ${(he.length>0||chongTG.length>0||chongDZ.length>0)?`
    <div class="rcard">
      <div class="rcard-title">做工关系 · 动能转化</div>
      ${he.map(h=>`<div class="gz-item-r"><div class="gz-item-header"><span class="gz-zuhe">${h.zuhe}</span><span class="tag tag-he">合·持续稳定</span></div><div class="gz-direction">${h.gaoneng_ss} 带动 ${h.dineng_ss}</div><div class="gz-desc">${h.fuzhetezhi}</div></div>`).join('')}
      ${chongTG.map(c=>`<div class="gz-item-r"><div class="gz-item-header"><span class="gz-zuhe">${c.zuhe}</span><span class="tag tag-chong">冲·脉冲爆发</span></div><div class="gz-direction">${c.zhudong_ss} 主动冲击 ${c.beidong_ss}</div><div class="gz-desc">${c.biaoxian}</div></div>`).join('')}
      ${chongDZ.map(c=>`<div class="gz-item-r"><div class="gz-item-header"><span class="gz-zuhe">${c.zuhe}</span><span class="tag tag-qianli">地支冲·做工不稳</span></div><div class="gz-desc">${c.yingxiang}</div></div>`).join('')}
    </div>`:''}

    <div class="rcard">
      <div class="rcard-title">能量解读</div>
      <div class="narrative">${r.jieda}</div>
    </div>

    <div class="bottom-actions">
      <button class="btn-action" onclick="copyResult()">复制解读</button>
      <button class="btn-action" onclick="shareText()">分享图谱</button>
      <button class="btn-restart" onclick="restart()">重测</button>
    </div>`;
}

function copyResult() {
  if(!savedResult) return;
  const r=savedResult.result, i=savedResult.inputs;
  const text=`【能量图谱】${i.nTG}${i.nDZ} ${i.yTG}${i.yDZ} ${i.rTG}${i.rDZ} ${i.sTG}${i.sDZ}\n\n格局：${r.gejuming}·${r.qudongmoshi}\n能量利用率：${Math.round(r.nengliang_liyong*100)}%·${r.neihao.dengji}\n\n${r.jieda}`;
  navigator.clipboard.writeText(text).then(()=>showToast('已复制到剪贴板'));
}

function shareText() {
  if(!savedResult) return;
  const r=savedResult.result;
  const text=`我的能量图谱：${r.gejuming}·${r.qudongmoshi}\n\n${r.jieda.slice(0,100)}...`;
  if(navigator.share){ navigator.share({title:'能量图谱',text}); }
  else{ navigator.clipboard.writeText(text).then(()=>showToast('已复制分享内容')); }
}

function restart() {
  savedResult=null;
  document.getElementById('err-msg').style.display='none';
  showScreen('s-input');
  window.scrollTo(0,0);
}

['n-tg','y-tg','r-tg','s-tg'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    this.classList.toggle('valid',TG.includes(this.value));
    this.classList.toggle('invalid',this.value&&!TG.includes(this.value));
  });
});
['n-dz','y-dz','r-dz','s-dz'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    this.classList.toggle('valid',DZ.includes(this.value));
    this.classList.toggle('invalid',this.value&&!DZ.includes(this.value));
  });
});
</script>
</body>
</html>
